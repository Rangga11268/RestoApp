# ============================================================
# RestoApp — Log Rotation Configuration
# Install : sudo cp logrotate.conf /etc/logrotate.d/restoapp
# ============================================================

# ── Laravel Application Logs ─────────────────────────────────
/var/www/restoapp/backend/storage/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0664 www-data www-data
    sharedscripts
    postrotate
        # Touch artisan to reset log handles (if using single driver)
        php8.3 /var/www/restoapp/backend/artisan cache:clear --quiet 2>/dev/null || true
    endscript
}

# ── Nginx Access Log ─────────────────────────────────────────
/var/log/nginx/restoapp_access.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}

# ── Nginx Error Log ──────────────────────────────────────────
/var/log/nginx/restoapp_error.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}

# ── Supervisor Logs ──────────────────────────────────────────
/var/log/supervisor/restoapp-queue.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 root root
    postrotate
        supervisorctl reread >/dev/null 2>&1 || true
    endscript
}

# ── Backup Script Log (if redirected) ────────────────────────
/var/log/restoapp-backup.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 root root
}
