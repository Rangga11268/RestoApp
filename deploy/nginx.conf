# ============================================================
# Nginx Configuration for RestoApp
# Replace "restoapp.com" with your actual domain
# ============================================================

# ── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name restoapp.com www.restoapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name restoapp.com www.restoapp.com;

    # ── TLS (Let's Encrypt via Certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/restoapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restoapp.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                    always;
    add_header X-Frame-Options          "DENY"                       always;
    add_header X-XSS-Protection         "1; mode=block"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(),microphone=(),geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Frontend SPA (React / Vite) ──────────────────────────
    root /var/www/restoapp/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Laravel Backend API ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        client_max_body_size 10M;
    }

    # ── Laravel Storage (public disk) ───────────────────────
    location /storage/ {
        alias /var/www/restoapp/backend/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Block sensitive files ────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/restoapp_access.log;
    error_log  /var/log/nginx/restoapp_error.log warn;
}
